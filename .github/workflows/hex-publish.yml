# Reusable workflow: Publish Elixir package to Hex.pm
#
# Triggered by downstream release.yml workflows when a tag is pushed
# or a GitHub release is published.
#
# Requires: HEX_API_KEY secret in calling repository.

name: Hex Publish

on:
  workflow_call:
    inputs:
      elixir-version:
        description: 'Elixir version'
        required: false
        default: '1.18'
        type: string
      otp-version:
        description: 'OTP version'
        required: false
        default: '27.0'
        type: string
      write-version-file:
        description: 'Write version from tag to a `version` file before publishing'
        required: false
        default: false
        type: boolean
      hex-organization:
        description: 'Hex.pm organization (omit for personal packages)'
        required: false
        default: ''
        type: string
    secrets:
      hex-api-key:
        description: 'Hex.pm API key'
        required: true

jobs:
  publish:
    name: Publish to Hex.pm
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: systemic-engineering/ci/actions/elixir-setup@main
        with:
          elixir-version: ${{ inputs.elixir-version }}
          otp-version: ${{ inputs.otp-version }}
          mix-env: dev

      - name: Write version file
        if: inputs.write-version-file
        run: |
          VERSION="${GITHUB_REF#refs/tags/v}"
          echo "$VERSION" > version
          echo "Version: $VERSION"

      - uses: systemic-engineering/ci/actions/hex-publish@main
        with:
          hex-api-key: ${{ secrets.hex-api-key }}
          hex-organization: ${{ inputs.hex-organization }}
